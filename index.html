<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <title>Ultimate Dice Cricket</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #11111d);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .game-container::before {
            content: "";
            position: absolute;
            inset: 0;
            background: url("background.jpg") left/580px no-repeat;
            opacity: 0.4;    
            z-index: -1;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 20px;
            color: #00f2fe;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .setup-screen {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }

        label {
            font-size: 14px;
            color: #ccc;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            background: #222235;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .toss-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 15px 0;
        }

        .coin {
            width: 80px;
            height: 80px;
            background: #ffb300;
            color: #11111d;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 179, 0, 0.5);
            border: 4px dashed #fff;
            transition: transform 0.6s ease;
        }

        .spinning {
            animation: spin 0.6s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .toss-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .match-info {
            font-size: 14px;
            color: #00f2fe;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .scoreboard {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-around;
            border-bottom: 3px solid #00f2fe;
        }

        .score-box h3 {
            font-size: 13px;
            color: #aaa;
            text-transform: uppercase;
        }

        .score-box p {
            font-size: 26px;
            font-weight: bold;
            color: #fff;
        }

        .dice-container {
            margin: 30px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90px;
        }

        .dice {
            width: 80px;
            height: 80px;
            background: #00f2fe;
            color: #11111d;
            font-size: 36px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
            transition: transform 0.5s ease;
        }

        .rolling {
            animation: roll 0.5s infinite linear;
        }

        @keyframes roll {
            0% { transform: rotate(0deg) scale(0.9); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(0.9); }
        }

        .btn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: none;
            color: #fff;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
            text-transform: uppercase;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.6);
        }

        .btn:disabled {
            background: #555 !important;
            box-shadow: none;
            cursor: not-allowed;
        }

        .btn-gold {
            background: linear-gradient(45deg, #ffb300, #ff8000);
            box-shadow: 0 5px 15px rgba(255, 179, 0, 0.4);
        }
        
        .btn-gold:hover {
            box-shadow: 0 8px 25px rgba(255, 179, 0, 0.6);
        }

        .commentary-box {
            margin-top: 20px;
            min-height: 55px;
            font-style: italic;
            color: #e0e0e0;
            font-size: 15px;
        }

        .wicket-alert { color: #ff4d4d !important; font-weight: bold; }
        .target-alert { color: #ffb300 !important; font-weight: bold; }
        .hidden { display: none !important; }

        /* --- Mobile Responsive Adjustments --- */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .game-container {
                padding: 20px 15px;
            }

            h1 {
                font-size: 22px;
                margin-bottom: 15px;
            }

            .scoreboard {
                padding: 10px;
                flex-wrap: wrap;
                gap: 10px;
            }

            .score-box p {
                font-size: 22px;
            }

            .coin {
                width: 65px;
                height: 65px;
                font-size: 16px;
            }

            .dice {
                width: 65px;
                height: 65px;
                font-size: 28px;
            }

            .toss-buttons {
                flex-direction: column;
                gap: 12px;
            }

            .btn {
                padding: 12px 20px;
                font-size: 14px;
            }

            .commentary-box {
                font-size: 13px;
                min-height: 45px;
            }
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>Dice Cricket</h1>
    
    <div id="setupScreen" class="setup-screen">
        <div>
            <label for="p1Name">Player 1 Name:</label>
            <input type="text" id="p1Name" placeholder="Enter Player 1 Name" value="Player 1">
        </div>
        <div>
            <label for="p2Name">Player 2 Name:</label>
            <input type="text" id="p2Name" placeholder="Enter Player 2 Name" value="Player 2">
        </div>

        <div>
            <label for="matchOvers">Select Overs:</label>
            <select id="matchOvers">
                <option value="6">1 Over (6 Balls)</option>
                <option value="12">2 Overs (12 Balls)</option>
                <option value="30" selected>5 Overs (30 Balls)</option>
                <option value="60">10 Overs (60 Balls)</option>
                <option value="120">20 Overs (120 Balls)</option>
            </select>
        </div>
        
        <button class="btn" onclick="goToToss()">Confirm & Go To Toss</button>
    </div>

    <div id="tossScreen" class="setup-screen hidden">
        <div class="toss-container">
            <label id="tossLabel">Player 1 Call Toss:</label>
            <div class="coin" id="coin">COIN</div>
            <div class="toss-buttons" id="tossActionArea">
                <button class="btn btn-gold" onclick="handleToss('HEADS')">Heads</button>
                <button class="btn btn-gold" onclick="handleToss('TAILS')">Tails</button>
            </div>
            <div id="tossStatus" style="font-weight: bold; color: #ffb300;"></div>
        </div>

        <div id="decisionArea" class="hidden">
            <label id="decisionLabel">Winner Choice:</label>
            <select id="userChoice"></select>
            <button class="btn" style="margin-top: 10px;" onclick="startMatch()">Start Match</button>
        </div>
    </div>

    <div id="gameplayScreen" class="hidden">
        <div class="match-info" id="matchStatus" style="text-align: center;">Innings 1</div>
        <div class="match-info" id="targetInfo" style="color: #ffb300; text-align: center;"></div>
        
        <div class="scoreboard">
            <div class="score-box">
                <h3>Batting Team</h3>
                <p id="battingTeam">-</p>
            </div>
            <div class="score-box">
                <h3>Score</h3>
                <p id="score">0 / 0</p>
            </div>
            <div class="score-box">
                <h3>Overs</h3>
                <p id="overs">0.0</p>
            </div>
        </div>

        <div class="dice-container">
            <div class="dice" id="dice">?</div>
        </div>

        <button class="btn" id="rollBtn" onclick="playBall()">Play Ball</button>

        <div class="commentary-box" id="commentary" style="text-align: center;">
            The bowlers are warming up! Click "Play Ball".
        </div>
    </div>
</div>

<script>

    let maxBalls = 30; 
    let p1Name = "Player 1";
    let p2Name = "Player 2";
    

    let currentInnings = 1;
    let targetRuns = null;
    let battingTeamName = "";
    
    
    let totalRuns = 0;
    let totalWickets = 0;
    let totalBalls = 0;
    let isRolling = false;

    
    let innings1Score = 0;

    let tossWinner = "";
    let firstBatter = "";
    let secondBatter = "";

    function goToToss() {
        p1Name = document.getElementById('p1Name').value.trim() || "Player 1";
        p2Name = document.getElementById('p2Name').value.trim() || "Player 2";
        
        document.getElementById('setupScreen').classList.add('hidden');
        document.getElementById('tossScreen').classList.remove('hidden');
        document.getElementById('tossLabel').innerText = `${p1Name}, Call the Toss:`;
    }

    function handleToss(player1Call) {
        document.getElementById('tossActionArea').style.pointerEvents = "none";
        const coinEl = document.getElementById('coin');
        const tossStatus = document.getElementById('tossStatus');
        const decisionArea = document.getElementById('decisionArea');
        const userChoiceDropdown = document.getElementById('userChoice');

        coinEl.classList.add('spinning');
        coinEl.innerText = "???";
        tossStatus.innerText = "Flipping coin...";

        setTimeout(() => {
            coinEl.classList.remove('spinning');
            const tossResult = (Math.random() < 0.5) ? "HEADS" : "TAILS";
            coinEl.innerText = tossResult;

            tossWinner = (player1Call === tossResult) ? p1Name : p2Name;
            
            tossStatus.innerText = `🎉 ${tossWinner} won the toss!`;
            document.getElementById('decisionLabel').innerText = `${tossWinner}, Select Your Action:`;

            if (tossWinner === p1Name) {
                userChoiceDropdown.innerHTML = `
                    <option value="bat">Bat First (${p1Name} Bats, ${p2Name} Bowls)</option>
                    <option value="bowl">Bowl First (${p2Name} Bats, ${p1Name} Bowls)</option>
                `;
            } else {
                userChoiceDropdown.innerHTML = `
                    <option value="bat">Bat First (${p2Name} Bats, ${p1Name} Bowls)</option>
                    <option value="bowl">Bowl First (${p1Name} Bats, ${p2Name} Bowls)</option>
                `;
            }

            decisionArea.classList.remove('hidden');
        }, 1200);
    }


    function startMatch() {
        maxBalls = parseInt(document.getElementById('matchOvers').value);
        let winnerChoice = document.getElementById('userChoice').value;

        if (winnerChoice === 'bat') {
            firstBatter = tossWinner;
            secondBatter = (tossWinner === p1Name) ? p2Name : p1Name;
        } else {
            firstBatter = (tossWinner === p1Name) ? p2Name : p1Name;
            secondBatter = tossWinner;
        }

        document.getElementById('tossScreen').classList.add('hidden');
        document.getElementById('gameplayScreen').classList.remove('hidden');

        setupInnings();
    }


    function setupInnings() {
        totalRuns = 0;
        totalWickets = 0;
        totalBalls = 0;
        
        if (currentInnings === 1) {
            battingTeamName = firstBatter;
            document.getElementById('matchStatus').innerText = "Innings 1";
            document.getElementById('targetInfo').innerText = "";
        } else {
            battingTeamName = secondBatter;
            document.getElementById('matchStatus').innerText = "Innings 2";
            document.getElementById('targetInfo').innerText = `Target: ${targetRuns} runs`;
        }

        document.getElementById('battingTeam').innerText = battingTeamName;
        updateScoreboard(); 
        
        document.getElementById('dice').innerText = "?";
        document.getElementById('dice').style.background = "#00f2fe"; 
        document.getElementById('rollBtn').innerText = "Play Ball";
        document.getElementById('rollBtn').disabled = false;
        document.getElementById('commentary').className = "commentary-box";
        document.getElementById('commentary').innerText = `${battingTeamName} ready to bat!`;
    }

    function rollCricketDice() {
        const dotWeight    = Math.random() * 3 + 2;   
        const oneWeight    = Math.random() * 3 + 2;   
        const twoWeight    = Math.random() * 2 + 1.5; 
        const fourWeight   = Math.random() * 3 + 1.5; 
        const sixWeight    = Math.random() * 2.5 + 1; 
        const threeWeight  = Math.random() * 0.5 + 0.1; 
        const wicketWeight = Math.random() * 0.9 + 0.3; 

        const outcomes = [
            { result: 0, label: "Dot Ball",            weight: dotWeight },
            { result: 1, label: "Single! 1 Run",        weight: oneWeight },
            { result: 2, label: "Double! 2 Runs",       weight: twoWeight },
            { result: 3, label: "Good running! 3 Runs", weight: threeWeight }, 
            { result: 4, label: "CRACKED! 4 Runs",      weight: fourWeight },
            { result: 5, label: "OUT!! Wicket Down!",   weight: wicketWeight }, 
            { result: 6, label: "BOOM! Massive 6!",     weight: sixWeight }
        ];

        const totalWeight = outcomes.reduce((sum, item) => sum + item.weight, 0);
        let randomNumber = Math.random() * totalWeight;

        for (const outcome of outcomes) {
            if (randomNumber < outcome.weight) return outcome;
            randomNumber -= outcome.weight;
        }
    }

    function playBall() {
        if (isRolling) return;

        if (document.getElementById('rollBtn').innerText === "START NEXT INNINGS") {
            setupInnings();
            return;
        }

        isRolling = true;
        const diceEl = document.getElementById('dice');
        const rollBtn = document.getElementById('rollBtn');
        const commentaryEl = document.getElementById('commentary');

        diceEl.classList.add('rolling');
        diceEl.innerText = "?";
        rollBtn.disabled = true;

        setTimeout(() => {
            const ballResult = rollCricketDice();
            diceEl.classList.remove('rolling');
            
            if (ballResult.result === 5) {
                diceEl.innerText = "W";
                diceEl.style.background = "#ff4d4d";
            } else {
                diceEl.innerText = ballResult.result;
                diceEl.style.background = "#00f2fe";
            }

            totalBalls++;
            if (ballResult.result === 5) {
                totalWickets++;
                commentaryEl.className = "commentary-box wicket-alert";
            } else {
                totalRuns += ballResult.result;
                commentaryEl.className = "commentary-box";
            }

            commentaryEl.innerText = ballResult.label;
            updateScoreboard();

            let isInningsOver = (totalWickets >= 10 || totalBalls >= maxBalls);
            
            if (currentInnings === 2 && totalRuns >= targetRuns) {
                isInningsOver = true;
            }

            if (isInningsOver) {
                handleInningsOver();
            } else {
                rollBtn.disabled = false;
            }

            isRolling = false;
        }, 500);
    }

    function updateScoreboard() {
        document.getElementById('score').innerText = `${totalRuns} / ${totalWickets}`;
        const overs = Math.floor(totalBalls / 6);
        const balls = totalBalls % 6;
        document.getElementById('overs').innerText = `${overs}.${balls}`;
    }

    function handleInningsOver() {
        const rollBtn = document.getElementById('rollBtn');
        const commentaryEl = document.getElementById('commentary');

        if (currentInnings === 1) {
            innings1Score = totalRuns;
            targetRuns = totalRuns + 1; 
            currentInnings = 2;
            
            commentaryEl.className = "commentary-box target-alert";
            commentaryEl.innerHTML = `<strong>Innings 1 Finished! ${battingTeamName} scored ${innings1Score} runs. Target for next innings: ${targetRuns} runs.</strong>`;
            
            rollBtn.innerText = "Start Next Innings";
            rollBtn.disabled = false;
        } else {
            let winnerMessage = "";
            let p1FinalScore, p2FinalScore;

            if (firstBatter === p1Name) {
                p1FinalScore = innings1Score;
                p2FinalScore = totalRuns;
            } else {
                p2FinalScore = innings1Score;
                p1FinalScore = totalRuns;
            }

            if (p1FinalScore === p2FinalScore) {
                winnerMessage = "🤝 MATCH DRAW! 🤝";
            } else if (p1FinalScore > p2FinalScore) {
                winnerMessage = `🎉 ${p1Name.toUpperCase()} WINS THE MATCH! 🎉`;
            } else {
                winnerMessage = `🎉 ${p2Name.toUpperCase()} WINS THE MATCH! 🎉`;
            }

            commentaryEl.innerHTML = `<strong style='color: #00f2fe; font-size: 18px;'>${winnerMessage}</strong><br>Final Score - ${p1Name}: ${p1FinalScore} | ${p2Name}: ${p2FinalScore}`;
            rollBtn.innerText = "Match Over";
            rollBtn.disabled = true;
        }
    }
</script>

</body>
</html>
